services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Backend/.env normally points at a MySQL server running on the host
      # (127.0.0.1). Inside the container, "127.0.0.1" would mean the
      # container itself, so route it back to the host machine instead.
      MYSQL_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
